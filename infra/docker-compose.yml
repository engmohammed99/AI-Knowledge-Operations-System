version: '3.8'

services:
  # 1. The Database
  postgres:
    image: postgres:15-alpine
    container_name: knowledge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: rag_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The Node.js Backend Engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/rag_database
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX}
    ports:
      - "5000:5000"

  # 3. The Next.js Copilot UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge_ui
    depends_on:
      - backend
    ports:
      - "3000:3000"

# Persist database data even if containers are destroyed
volumes:
  pgdata:
